namespace:
  create: false
  name: hexlet-project

nameOverride: hexlet-application
fullnameOverride: hexlet-project

replicaCount: 1

image:
  repository: cr.yandex/crpd2isbgl7k3puo75s1/project-devops-deploy
  pullPolicy: Always
  tag: latest

containerName: project-devops-deploy
containerPort: 8080

imagePullSecrets: []

serviceAccount:
  create: true
  name: my-service-account
  imagePullSecrets:
    - name: docker-registry-credentials

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 3000
  fsGroup: 2000
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

terminationGracePeriodSeconds: 45

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

config:
  STORAGE_S3_REGION: ru-central1
  MANAGEMENT_SERVER_PORT: "9090"
  JAVA_OPTS: "-Xms256m -Xmx512m -Dspring.profiles.active=prod"
  SPRING_PROFILES_ACTIVE: prod

appCredentialsSecretName: app-credentials

resources:
  requests:
    memory: 500Mi
    cpu: 300m
  limits:
    memory: 1000Mi
    cpu: 500m

readinessProbe:
  httpGet:
    path: /actuator/health
    port: 9090
  initialDelaySeconds: 8
  periodSeconds: 8
  failureThreshold: 3

lifecycle:
  preStop:
    command:
      - /bin/sh
      - -c
      - sleep 10

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  portName: http

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 20
    - type: Resource
      resource:
        name: memory
        target:
          type: AverageValue
          averageValue: 350Mi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

externalSecrets:
  enabled: true
  refreshInterval: 1h
  lockboxSecretId: e6q99s5l12keq0c6r9i5
  secretStore:
    name: secret-store
  dockerRegistry:
    enabled: true
    secretName: docker-registry-credentials
    registry: cr.yandex
  ycAuth:
    secretName: yc-auth
    key: authorized-key
    # Заполните через values.secrets.yaml (make secrets-values) или вручную из authorized-key.json
    authorizedKey: {}

nodeSelector: {}
tolerations: []
affinity: {}
