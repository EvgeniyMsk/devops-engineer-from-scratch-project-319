{{- if and .Values.ingress.enabled .Values.ingress.certManager.enabled }}
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: {{ .Values.ingress.certManager.clusterIssuer }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  acme:
    {{- if .Values.ingress.certManager.staging }}
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    {{- else }}
    server: https://acme-v02.api.letsencrypt.org/directory
    {{- end }}
    email: {{ .Values.ingress.certManager.email | required "ingress.certManager.email обязателен при certManager.enabled" }}
    privateKeySecretRef:
      name: {{ .Values.ingress.certManager.clusterIssuer }}-account-key
    solvers:
      - http01:
          ingress:
            class: {{ .Values.ingress.className }}
{{- end }}
