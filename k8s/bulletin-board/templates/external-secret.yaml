{{- if and .Values.externalSecrets.enabled .Values.externalSecrets.dockerRegistry.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: docker-registry-secret
  namespace: {{ include "bulletin-board.namespace" . }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.externalSecrets.dockerRegistry.secretName }}
    template:
      type: kubernetes.io/dockerconfigjson
      engineVersion: v2
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "{{ .Values.externalSecrets.dockerRegistry.registry }}": {
                "username": "oauth",
                "password": "{{`{{ .docker_oauth_token }}`}}",
                "auth": "{{`{{ printf "oauth:%s" .docker_oauth_token | b64enc }}`}}"
              }
            }
          }
  data:
    - secretKey: docker_oauth_token
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: docker_oauth_token
{{- end }}
