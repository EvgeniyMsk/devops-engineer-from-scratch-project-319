{{- if .Values.externalSecrets.enabled }}
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: app-credentials
  namespace: {{ include "bulletin-board.namespace" . }}
  labels:
    {{- include "bulletin-board.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore.name }}
    kind: SecretStore
  target:
    name: {{ .Values.appCredentialsSecretName }}
  data:
    - secretKey: STORAGE_S3_ENDPOINT
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: STORAGE_S3_ENDPOINT
    - secretKey: STORAGE_S3_BUCKET
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: STORAGE_S3_BUCKET
    - secretKey: STORAGE_S3_ACCESS_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: STORAGE_S3_ACCESS_KEY
    - secretKey: STORAGE_S3_SECRET_KEY
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: STORAGE_S3_SECRET_KEY
    - secretKey: SPRING_DATASOURCE_URL
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: SPRING_DATASOURCE_URL
    - secretKey: SPRING_DATASOURCE_USERNAME
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: SPRING_DATASOURCE_USERNAME
    - secretKey: SPRING_DATASOURCE_PASSWORD
      remoteRef:
        key: {{ .Values.externalSecrets.lockboxSecretId }}
        property: SPRING_DATASOURCE_PASSWORD
{{- end }}
